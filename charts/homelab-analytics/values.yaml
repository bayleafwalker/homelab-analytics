nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/bayleafwalker/homelab-analytics
  tag: "0.1.0"
  pullPolicy: IfNotPresent

webImage:
  repository: ghcr.io/bayleafwalker/homelab-analytics-web
  tag: "0.1.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

commonEnv:
  HOMELAB_ANALYTICS_DATA_DIR: /data
  HOMELAB_ANALYTICS_API_HOST: 0.0.0.0
  HOMELAB_ANALYTICS_API_PORT: "8080"
  HOMELAB_ANALYTICS_WEB_HOST: 0.0.0.0
  HOMELAB_ANALYTICS_WEB_PORT: "8081"
  HOMELAB_ANALYTICS_WORKER_POLL_INTERVAL: "30"
  HOMELAB_ANALYTICS_AUTH_MODE: local

extraEnv: []

service:
  type: ClusterIP

persistence:
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  storageClass: ""

api:
  enabled: true
  replicas: 1
  port: 8080
  secretEnvFrom: []
  resources: {}

web:
  enabled: true
  replicas: 1
  port: 8081
  secretEnvFrom: []
  resources: {}

worker:
  enabled: true
  replicas: 1
  secretEnvFrom: []
  command:
    - homelab-analytics-worker
    - watch-schedule-dispatches
  resources: {}
