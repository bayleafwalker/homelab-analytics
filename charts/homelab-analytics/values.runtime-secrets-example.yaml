image:
  tag: "2026.03.10"

commonEnv:
  HOMELAB_ANALYTICS_DATA_DIR: /data
  HOMELAB_ANALYTICS_API_HOST: 0.0.0.0
  HOMELAB_ANALYTICS_API_PORT: "8080"
  HOMELAB_ANALYTICS_WEB_HOST: 0.0.0.0
  HOMELAB_ANALYTICS_WEB_PORT: "8081"
  HOMELAB_ANALYTICS_WORKER_POLL_INTERVAL: "30"
  HOMELAB_ANALYTICS_METADATA_BACKEND: postgres
  HOMELAB_ANALYTICS_REPORTING_BACKEND: postgres
  HOMELAB_ANALYTICS_BLOB_BACKEND: s3
  HOMELAB_ANALYTICS_AUTH_MODE: local

api:
  secretEnvFrom:
    - homelab-analytics-reporting-read
    - homelab-analytics-auth-local

web:
  secretEnvFrom:
    - homelab-analytics-reporting-read
    - homelab-analytics-auth-local

worker:
  secretEnvFrom:
    - homelab-analytics-landing-write
    - homelab-analytics-transformation-write
    - homelab-analytics-auth-local
