name: Verify

on:
  pull_request:

jobs:
  verify-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: azure/setup-helm@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          cd apps/web/frontend
          npm ci

      - name: Run blocking verification
        run: make verify-fast

      - name: Build contract artifact bundle for pull requests
        run: make contract-release-artifacts CONTRACT_BASE_REF=origin/${{ github.base_ref }}

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: contract-artifacts-${{ github.sha }}
          path: dist/contracts

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: make docker-build

      - name: Run Compose startup smoke
        run: make compose-smoke

  dependency-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Advisory dependency audit
        run: make audit-deps
