services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homelab
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: homelab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab -d homelab"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - homelab_analytics_postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - homelab_analytics_minio:/data

  api:
    image: homelab-analytics:latest
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    env_file:
      - ./secrets/auth-local.env.example
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      HOMELAB_ANALYTICS_DATA_DIR: /data
      HOMELAB_ANALYTICS_METADATA_BACKEND: postgres
      HOMELAB_ANALYTICS_POSTGRES_DSN: postgresql://homelab:homelab@postgres:5432/homelab
      HOMELAB_ANALYTICS_REPORTING_BACKEND: postgres
      HOMELAB_ANALYTICS_BLOB_BACKEND: s3
      HOMELAB_ANALYTICS_AUTH_MODE: local
      HOMELAB_ANALYTICS_S3_ENDPOINT_URL: http://minio:9000
      HOMELAB_ANALYTICS_S3_BUCKET: homelab-landing
      HOMELAB_ANALYTICS_S3_REGION: us-east-1
      HOMELAB_ANALYTICS_S3_ACCESS_KEY_ID: minioadmin
      HOMELAB_ANALYTICS_S3_SECRET_ACCESS_KEY: minioadmin
      HOMELAB_ANALYTICS_S3_PREFIX: bronze
      HOMELAB_ANALYTICS_API_HOST: 0.0.0.0
      HOMELAB_ANALYTICS_API_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - homelab_analytics_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    command: ["homelab-analytics-api"]

  web:
    image: homelab-analytics-web:latest
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - ./secrets/auth-local.env.example
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      HOMELAB_ANALYTICS_DATA_DIR: /data
      HOMELAB_ANALYTICS_METADATA_BACKEND: postgres
      HOMELAB_ANALYTICS_POSTGRES_DSN: postgresql://homelab:homelab@postgres:5432/homelab
      HOMELAB_ANALYTICS_REPORTING_BACKEND: postgres
      HOMELAB_ANALYTICS_BLOB_BACKEND: s3
      HOMELAB_ANALYTICS_AUTH_MODE: local
      HOMELAB_ANALYTICS_API_BASE_URL: http://api:8080
      HOMELAB_ANALYTICS_S3_ENDPOINT_URL: http://minio:9000
      HOMELAB_ANALYTICS_S3_BUCKET: homelab-landing
      HOMELAB_ANALYTICS_S3_REGION: us-east-1
      HOMELAB_ANALYTICS_S3_ACCESS_KEY_ID: minioadmin
      HOMELAB_ANALYTICS_S3_SECRET_ACCESS_KEY: minioadmin
      HOMELAB_ANALYTICS_S3_PREFIX: bronze
      HOMELAB_ANALYTICS_WEB_HOST: 0.0.0.0
      HOMELAB_ANALYTICS_WEB_PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - homelab_analytics_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/ready').then((r) => r.text()).then(() => process.exit(0)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    image: homelab-analytics:latest
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    profiles: ["worker"]
    env_file:
      - ./secrets/auth-local.env.example
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      HOMELAB_ANALYTICS_DATA_DIR: /data
      HOMELAB_ANALYTICS_METADATA_BACKEND: postgres
      HOMELAB_ANALYTICS_POSTGRES_DSN: postgresql://homelab:homelab@postgres:5432/homelab
      HOMELAB_ANALYTICS_REPORTING_BACKEND: postgres
      HOMELAB_ANALYTICS_BLOB_BACKEND: s3
      HOMELAB_ANALYTICS_AUTH_MODE: local
      HOMELAB_ANALYTICS_S3_ENDPOINT_URL: http://minio:9000
      HOMELAB_ANALYTICS_S3_BUCKET: homelab-landing
      HOMELAB_ANALYTICS_S3_REGION: us-east-1
      HOMELAB_ANALYTICS_S3_ACCESS_KEY_ID: minioadmin
      HOMELAB_ANALYTICS_S3_SECRET_ACCESS_KEY: minioadmin
      HOMELAB_ANALYTICS_S3_PREFIX: bronze
    volumes:
      - homelab_analytics_data:/data
    entrypoint: ["homelab-analytics-worker"]
    command: ["watch-schedule-dispatches"]

volumes:
  homelab_analytics_data:
  homelab_analytics_minio:
  homelab_analytics_postgres:
