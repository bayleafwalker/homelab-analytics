apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homelab-analytics-postgres
  annotations:
    homelab-analytics.example/type: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: homelab-secrets
  target:
    name: homelab-analytics-postgres
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DSN
      remoteRef:
        key: homelab-analytics/postgres
        property: dsn
