apiVersion: v1
kind: Secret
metadata:
  name: homelab-analytics-auth-oidc
  annotations:
    homelab-analytics.example/type: oidc
type: Opaque
stringData:
  HOMELAB_ANALYTICS_SESSION_SECRET: replace-me-oidc-session-secret
  HOMELAB_ANALYTICS_OIDC_ISSUER_URL: https://auth.example.internal/application/o/homelab/
  HOMELAB_ANALYTICS_OIDC_CLIENT_ID: homelab-analytics
  HOMELAB_ANALYTICS_OIDC_CLIENT_SECRET: replace-me
  HOMELAB_ANALYTICS_OIDC_REDIRECT_URI: https://analytics.example.internal/auth/callback
  HOMELAB_ANALYTICS_OIDC_API_AUDIENCE: homelab-analytics-api
  HOMELAB_ANALYTICS_OIDC_ADMIN_GROUPS: homelab-analytics-admins
